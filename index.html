<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhyNotBen | Kha Dev</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:url('haha.JPG') center/cover;
    overflow-x:hidden;
    color:white;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(2px);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:500px;
    margin:auto;
    padding:20px;
}

.glass{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    box-shadow:0 0 25px rgba(181,108,255,.25);
}

.topbar{
    margin-top:10px;
    padding:12px;
    text-align:center;
    color:#d7b0ff;
    font-weight:bold;
}

.avatar{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:25px auto 15px;
    border:4px solid #b56cff;
    box-shadow:0 0 40px #b56cff;
}

.badge{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#b56cff;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    left:62%;
    margin-top:-50px;
}

.welcome{
    margin-top:25px;
    text-align:center;
}

.welcome span{
    padding:10px 20px;
    border-radius:999px;
}

h1{
    text-align:center;
    margin-top:15px;
    font-size:3rem;
    color:white;
    text-shadow:
    0 0 10px #b56cff,
    0 0 20px #b56cff,
    0 0 40px #b56cff;
}

.typing{
    text-align:center;
    margin-top:20px;
    font-size:1.2rem;
    color:#dcb6ff;
}

.socials{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:30px;
}

.socials a{
    text-decoration:none;
    color:white;
    padding:18px 10px;
    text-align:center;
    border-radius:20px;
}

.socials i{
    font-size:28px;
    margin-bottom:10px;
}

.music{
    margin-top:25px;
    padding:20px;
}

.music img{
    width:100%;
    border-radius:20px;
}

.player{
    margin-top:15px;
    text-align:center;
}

.player button{
    background:#b56cff;
    color:white;
    border:none;
    width:55px;
    height:55px;
    border-radius:50%;
    cursor:pointer;
    font-size:20px;
}

.quote{
    margin-top:20px;
    padding:18px;
    text-align:center;
}

.footer{
    margin-top:20px;
    padding:20px;
    text-align:center;
    margin-bottom:30px;
}

.flower{
    position:fixed;
    top:-20px;
    animation:fall linear infinite;
    color:#ffb7ff;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-50px);
    }
    to{
        transform:translateY(110vh);
    }
}
.music-player{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin:30px auto;
padding:18px 25px;
width:fit-content;
border-radius:40px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
}

.music-player button{
width:70px;
height:70px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.1);
color:white;
font-size:24px;
}

.music-player button:last-child{
background:#9b5cff;
}

.music{
position:fixed;
bottom:20px;
right:20px;
z-index:9999;
padding:15px 20px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 25px rgba(155,92,255,.4);
}

.donate{
    text-align:center;
    padding:20px;
}

.donate img{
    width:120px;
    height:120px;
    border-radius:15px;
    display:block;
    margin:10px auto;
}

.donate-btn{
    display:inline-block;
    margin-top:10px;
    padding:12px 20px;
    border-radius:999px;
    background:#b56cff;
    color:#fff !important;
    text-decoration:none;
    font-weight:600;
}
</style>


</head>


<body>


<div class="overlay"></div>


<div class="container">


<div class="glass topbar">
    WhyNotBen
</div>

<img src="avatar.JPG" class="avatar">

<div class="badge">
    <i class="fas fa-check"></i>
</div>

<div class="welcome">
    <span class="glass">Welcome To</span>
</div>

<h1>Kha Dev</h1>

<div class="typing glass" style="padding:15px;">
    Frontend Developer
</div>

<div class="socials">
    <a href="https://www.tiktok.com/@ifsihry" target="_blank" class="glass">
        <i class="fab fa-tiktok"></i>
    </a>

    <a href="https://t.me/whynotben" target="_blank" class="glass">
        <i class="fab fa-telegram"></i>
    </a>

    <a href="https://github.com/whynotben" target="_blank" class="glass">
        <i class="fab fa-github"></i>
    </a>
    
    <a href="https://on.soundcloud.com/IS0hEXqtaSmykTmF18" target="_blank" class="glass">
    <i class="fab fa-soundcloud"></i>
</a>
</div>

<div class="music">

<div class="music-player">

<button onclick="prevMusic()">
    <i class="fas fa-backward"></i>
</button>

<button onclick="playMusic()" id="playBtn">
    <i class="fas fa-play"></i>
</button>

<button onclick="nextMusic()">
    <i class="fas fa-forward"></i>
</button>

<button>
    <i class="fas fa-music"></i>
</button>

</div>

<audio id="audio" src="hi.mp3"></audio>

</div>

<div class="glass donate">
    <h3>💖 Donate Me</h3>

    <img src="QR.jpg" alt="QR Donate">

    <p>BIDV</p>
    <p>8876926800</p>

    <a href="https://img.vietqr.io/image/BIDV-8876926800-compact2.png"
       target="_blank"
       class="donate-btn">
       ⚡ Chuyển khoản nhanh
    </a>
</div>

<div class="glass footer">
    © 2026 WhyNotBen • Kha Dev
</div>

</div>


<script>
function playMusic(){
    const audio = document.getElementById("audio");

    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

for(let i=0;i<20;i++){
    let flower=document.createElement("div");
    flower.className="flower";
    flower.innerHTML="🌸";

    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(5+Math.random()*8)+"s";

    document.body.appendChild(flower);
}
</script>



</body>
</html>
