<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhyNotBen | Kha Dev</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1974') center/cover;
    overflow-x:hidden;
    color:white;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(20,0,40,.55);
    backdrop-filter:blur(4px);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:500px;
    margin:auto;
    padding:20px;
}

.glass{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    box-shadow:0 0 25px rgba(181,108,255,.25);
}

.topbar{
    margin-top:10px;
    padding:12px;
    text-align:center;
    color:#d7b0ff;
    font-weight:bold;
}

.avatar{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:25px auto 15px;
    border:4px solid #b56cff;
    box-shadow:0 0 40px #b56cff;
}

.badge{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#b56cff;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    left:62%;
    margin-top:-50px;
}

.welcome{
    margin-top:25px;
    text-align:center;
}

.welcome span{
    padding:10px 20px;
    border-radius:999px;
}

h1{
    text-align:center;
    margin-top:15px;
    font-size:3rem;
    color:white;
    text-shadow:
    0 0 10px #b56cff,
    0 0 20px #b56cff,
    0 0 40px #b56cff;
}

.typing{
    text-align:center;
    margin-top:20px;
    font-size:1.2rem;
    color:#dcb6ff;
}

.socials{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:30px;
}

.socials a{
    text-decoration:none;
    color:white;
    padding:18px 10px;
    text-align:center;
    border-radius:20px;
}

.socials i{
    font-size:28px;
    margin-bottom:10px;
}

.music{
    margin-top:25px;
    padding:20px;
}

.music img{
    width:100%;
    border-radius:20px;
}

.player{
    margin-top:15px;
    text-align:center;
}

.player button{
    background:#b56cff;
    color:white;
    border:none;
    width:55px;
    height:55px;
    border-radius:50%;
    cursor:pointer;
    font-size:20px;
}

.quote{
    margin-top:20px;
    padding:18px;
    text-align:center;
}

.footer{
    margin-top:20px;
    padding:20px;
    text-align:center;
    margin-bottom:30px;
}

.flower{
    position:fixed;
    top:-20px;
    animation:fall linear infinite;
    color:#ffb7ff;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-50px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>


</head>


<body>


<div class="overlay"></div>


<div class="container">


<div class="glass topbar">
    WhyNotBen
</div>

<img src="avatar.JPG" class="avatar">

<div class="badge">
    <i class="fas fa-check"></i>
</div>

<div class="welcome">
    <span class="glass">Welcome To</span>
</div>

<h1>Kha Dev</h1>

<div class="typing glass" style="padding:15px;">
    Frontend Developer
</div>

<div class="socials">
    <a href="#" class="glass">
        <i class="fab fa-facebook"></i>
    </a>

    <a href="#" class="glass">
        <i class="fab fa-tiktok"></i>
    </a>

    <a href="#" class="glass">
        <i class="fab fa-telegram"></i>
    </a>

    <a href="#" class="glass">
        <i class="fab fa-youtube"></i>
    </a>

    <a href="#" class="glass">
        <i class="fab fa-github"></i>
    </a>
</div>

<div class="glass music">
    <img src="avatar.jpg">

    <div class="player">
        <h3>Now Playing</h3>
        <br>
        <audio id="audio" src="music.mp3"></audio>

        <button onclick="playMusic()">
            <i class="fas fa-play"></i>
        </button>
    </div>
</div>

<div class="glass quote">
    Code is like humor. When you have to explain it, it's bad.
</div>

<div class="glass footer">
    © 2026 WhyNotBen • Kha Dev
</div>

</div>


<script>
function playMusic(){
    const audio = document.getElementById("audio");

    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

for(let i=0;i<20;i++){
    let flower=document.createElement("div");
    flower.className="flower";
    flower.innerHTML="🌸";

    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(5+Math.random()*8)+"s";

    document.body.appendChild(flower);
}
</script>



</body>
</html>
